services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: moodle
      POSTGRES_PASSWORD: moodle
      POSTGRES_DB: moodle
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moodle"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ./.runtime/postgres:/var/lib/postgresql/data

  web:
    image: moodlehq/moodle-php-apache:8.3
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${MOODLE_PORT:-8097}:80"
    volumes:
      - ./.runtime/moodle-src:/var/www/html:cached
      - ./.runtime/moodledata:/var/www/moodledata:delegated
      - ../../plugin/webirr:/var/www/html/public/payment/gateway/webirr:cached
      - ./scripts:/var/www/html/webirr-demo-scripts:ro
    environment:
      MOODLE_DOCKER_DBTYPE: pgsql
      WEBIRR_TEST_ENV_MERCHANT_ID: ${WEBIRR_TEST_ENV_MERCHANT_ID:-}
      WEBIRR_TEST_ENV_API_KEY: ${WEBIRR_TEST_ENV_API_KEY:-}
      WEBIRR_MOODLE_DEMO_USERNAME: ${WEBIRR_MOODLE_DEMO_USERNAME:-webirrstudent}
      WEBIRR_MOODLE_DEMO_PASSWORD: ${WEBIRR_MOODLE_DEMO_PASSWORD:-WebirrDemo1!}
